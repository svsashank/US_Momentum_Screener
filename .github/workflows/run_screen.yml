name: Run Momentum Screen

on:
  repository_dispatch:
    types: [run_screen]

jobs:
  screen:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance supabase pandas numpy requests

      - name: Run screener
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SCREEN_PARAMS: ${{ toJson(github.event.client_payload.params) }}
        run: python screener.py
